<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <!-- FontAwesome for clean dashboard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h2>HRMS Portal</h2>
            <nav>
                <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="employees.html"><i class="fas fa-users"></i> Employees</a>
                <a href="#"><i class="fas fa-calendar-check"></i> Attendance</a>
                <a href="leave-requests.html"><i class="fas fa-envelope-open-text"></i> Leave Requests</a>
                <a href="departments.html"><i class="fas fa-sitemap"></i> Departments</a>
                <a href="#"><i class="fas fa-file-invoice-dollar"></i> Payroll</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <h1>Welcome Back, Admin</h1>
                <div class="user-profile">
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <!-- Metrics Grid Cards -->
            <section class="cards-grid">
                <div class="card">
                    <div class="card-icon"><i class="fas fa-users"></i></div>
                    <div class="card-info">
                        <h3>Total Employees</h3>
                        <p class="number">124</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="fas fa-user-check"></i></div>
                    <div class="card-info">
                        <h3>Present Today</h3>
                        <p class="number">98</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="fas fa-calendar-times"></i></div>
                    <div class="card-info">
                        <h3>Leave Requests</h3>
                        <p class="number">7</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon"><i class="fas fa-sitemap"></i></div>
                    <div class="card-info">
                        <h3>Departments</h3>
                        <p class="number">6</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
