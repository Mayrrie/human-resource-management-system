<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;   /* Horizontal center */
      align-items: center;       /* Vertical center */
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: darkblue;
    }

    a {
      text-decoration: none;
      color: blue;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Welcome Back</h2>
    <p>Login to your account</p>

    <input type="text" placeholder="Email or Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <p>Don't have an account? <a href="#">Sign Up</a></p>
  </div>

</body>
</html>
