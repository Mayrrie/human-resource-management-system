<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Profile</title>
    <link rel="stylesheet" href="employees.css">
</head>
<body>
    <div class="container">
        <a href="dashboard.html">← Back to Dashboard</a>
        
        <div class="profile-header">
            <img id="pfp" src="" alt="Profile Picture">
            <div>
                <h2 id="emp-name">Loading...</h2>
                <input type="file" id="pfp-upload" onchange="updatePFP(event)" style="width: auto;">
            </div>
        </div>

        <div class="data-grid">
            <div class="form-group"><label>Address:</label><input type="text" id="address"></div>
            <div class="form-group"><label>Phone:</label><input type="text" id="phone"></div>
            <div class="form-group"><label>Job Title:</label><input type="text" id="job" disabled></div>
            <div class="form-group"><label>Salary:</label><input type="text" id="salary" disabled></div>
        </div>

        <div class="documents-section">
            <h3>Documents</h3>
            <ul class="doc-list" id="doc-list">
                <li>Contract.pdf <button>View</button></li>
            </ul>
            <input type="file" id="doc-input">
            <button onclick="uploadDoc()">Upload New Document</button>
        </div>

        <button onclick="saveProfile()">Save Changes</button>
        <button onclick="toggleAdmin()">Toggle Admin Mode</button>
    </div>

    <script>
        const employees = {
            "aarav": { name: "Aarav Sharma", address: "Kolkata", phone: "9876543210", job: "Software Engineer", salary: "$50,000" },
            "priya": { name: "Priya Singh", address: "Mumbai", phone: "9123456789", job: "Project Manager", salary: "$65,000" }
        };

        const params = new URLSearchParams(window.location.search);
        const empId = params.get('id') || 'aarav';
        const emp = employees[empId];

        document.getElementById('emp-name').innerText = emp.name;
        document.getElementById('address').value = emp.address;
        document.getElementById('phone').value = emp.phone;
        document.getElementById('job').value = emp.job;
        document.getElementById('salary').value = emp.salary;

        function updatePFP(event) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('pfp').src = reader.result;
            reader.readAsDataURL(event.target.files[0]);
        }

        function toggleAdmin() {
            const job = document.getElementById('job');
            const salary = document.getElementById('salary');
            job.disabled = !job.disabled;
            salary.disabled = !salary.disabled;
        }

        function uploadDoc() {
            const file = document.getElementById('doc-input').files[0];
            if (file) {
                const li = document.createElement('li');
                li.innerHTML = `${file.name} <button>View</button>`;
                document.getElementById('doc-list').appendChild(li);
            }
        }

        function saveProfile() { alert("Changes saved successfully!"); }
    </script>
</body>
</html>
